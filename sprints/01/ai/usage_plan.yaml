goals:
  - "Az edző-kliens kapcsolat adatmodelljének (ER-diagram) megtervezése és optimalizálása."
  - "Az MI-alapú kiégés-megelőző és teljesítmény-elemző riportok prompt engineering feladatainak elvégzése."
  - "Versenytárs elemzés a piacon lévő coaching appok adatkezelési és automatizációs hiányosságairól."
  - "Az adatfolyamok (Data Pipeline) tervezése a napi bejelentkezésektől az összesített riportokig."

operational_cadence:
  check_in: "Hetente többször használom az MI-t kódgenerálásra, hibakeresésre és architektúra-tervezésre."
  review_partner: "A konzulensemmel és a szakmai mentorokkal (MI) rendszeresen validálom a technikai megoldásokat."

guardrails:
  - "Személyes egészségügyi adatokat soha nem küldök az MI-nek, csak anonim tesztadatokat."
  - "Minden generált kódot manuálisan tesztelek és biztonsági szempontból felülvizsgálok."
  - "A projekt technikai döntéseit dokumentálom, hogy az MI segítsége mellett is megmaradjon a saját mérnöki kontrollom."

tools:
  - name: "Gemini / ChatGPT"
    use_cases:
      - "FastAPI backend architektúra és adatbázis modellek tervezése"
      - "Tailwind 4 CSS és Next.js frontend komponensek generálása és debuggolása"
      - "Data Engineering feladatok: Python alapú adatfeldolgozó scriptek írása"
  - name: "Figma (AI tools)"
    use_cases:
      - "UI/UX prototípusok készítése az edzői dashboardhoz"